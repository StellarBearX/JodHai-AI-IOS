name: JodHai
options:
  bundleIdPrefix: com.jodhai
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

configs:
  Debug: debug
  Release: release

targets:

  JodHai:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: JodHai
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jodhai.app
        INFOPLIST_FILE: JodHai/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - target: JodHaiWidgetExtension
        embed: true

  JodHaiWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: JodHaiWidget
      # Widget needs ExpenseModel (@Model) and the Expense domain entity it maps to
      - path: JodHai/Data/Models/ExpenseModel.swift
      - path: JodHai/Domain/Entities/Expense.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jodhai.app.widget
        INFOPLIST_FILE: JodHaiWidget/Info.plist
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
      - sdk: AppIntents.framework
